/* ========= HELPERS ========= */

// zistí country kód
function extractCountry(event) {
    if (event.country) return event.country;
    const m = event.title.match(/^[A-Z]{2}/);
    return m ? m[0] : null;
}

// mapovanie + normalizácia
function normalizeCountry(code) {
    if (!code) return null;

    const map = {
        EA: "eu", // Euro Area
        EZ: "eu", // alternate Euro Area
        UK: "gb"  // United Kingdom
    };

    return (map[code] || code).toLowerCase();
}

// HTML vlajka (externý CDN)
function flagHTML(country) {
    const c = normalizeCountry(country);
    if (!c) return "";
    return `<img class="flag" src="https://flagcdn.com/w40/${c}.png" alt="${country}">`;
}

/* ========= CORE ========= */

let currentBatch = [];
let currentIndex = 0;
let lastBatchTime = null;
let rotationTimer = null;

function getNextBatch() {
    const now = new Date();
    const future = events
        .map(e => ({ ...e, date: new Date(e.time) }))
        .filter(e => e.date > now)
        .sort((a, b) => a.date - b.date);

    if (!future.length) return null;

    const firstTime = future[0].date.getTime();
    return future.filter(e => e.date.getTime() === firstTime);
}

function startRotation() {
    if (rotationTimer) clearInterval(rotationTimer);
    rotationTimer = setInterval(() => {
        currentIndex = (currentIndex + 1) % currentBatch.length;
    }, ROTATION_INTERVAL);
}

function updateCountdown() {
    const line = document.getElementById("line");
    const batch = getNextBatch();

    if (!batch) {
        line.innerText = "⚠️ Next Economic Event : --:--:--:--";
        return;
    }

    const batchTime = batch[0].date.getTime();
    if (batchTime !== lastBatchTime) {
        currentBatch = batch;
        currentIndex = 0;
        lastBatchTime = batchTime;
        startRotation();
    }

    let diff = Math.floor((batch[0].date - new Date()) / 1000);
    if (diff < 0) diff = 0;

    const d = String(Math.floor(diff / 86400)).padStart(2, "0");
    diff %= 86400;
    const h = String(Math.floor(diff / 3600)).padStart(2, "0");
    diff %= 3600;
    const m = String(Math.floor(diff / 60)).padStart(2, "0");
    const s = String(diff % 60).padStart(2, "0");

    const ev = currentBatch[currentIndex];
    const country = extractCountry(ev);

    // odstráni "US ", "DE ", atď. z title
    const cleanTitle = ev.title.replace(/^[A-Z]{2}\s*/, "");

    line.innerHTML =
        `⚠️ Next Economic Event ${flagHTML(country)}${cleanTitle} : ${d}:${h}:${m}:${s}`;
}

setInterval(updateCountdown, 1000);
updateCountdown();
